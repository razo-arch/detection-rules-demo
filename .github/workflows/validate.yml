name: Validate Detection Rules

on:
  pull_request:
    branches: [main]
    paths:
      - "sigma/**"
      - "tests/**"
      - "runner/**"

jobs:
  detection-tests:
    name: Detection Logic Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Run detection logic tests (does each rule actually detect?)
        run: python runner/sigma_test.py --rules sigma/rules --tests tests/sigma

      - name: Run detection tests (pytest, per-case)
        run: pytest -v

  validate-sigma:
    name: Validate Sigma Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sigma-cli
        run: pip install sigma-cli pySigma-backend-elasticsearch

      - name: Validate Sigma rule syntax
        run: |
          for rule in $(find sigma/rules -name "*.yml"); do
            sigma check "$rule" && echo "  [PASS] $rule" || exit 1
          done

  validate-elk:
    name: Validate ELK Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run ELK rule validation
        run: python scripts/validate_elk_rules.py

  validate-wazuh:
    name: Validate Wazuh Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Run Wazuh rule validation
        run: |
          chmod +x scripts/validate_wazuh_rules.sh
          bash scripts/validate_wazuh_rules.sh