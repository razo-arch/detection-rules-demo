name: Convert and Deploy Detection Rules

on:
  push:
    branches: [main]
    paths:
      - "sigma/**"
      - "scripts/**"
      - "tests/**"
  workflow_dispatch:

jobs:

  detection-tests:
    name: Detection Logic Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyyaml
      - name: Run detection logic tests
        run: python _detection-testing/runner/sigma_test.py --rules sigma/rules --tests tests/sigma
	
  convert:
    name: Convert Sigma Rules
    needs: detection-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Convert all Sigma rules
        run: |
          chmod +x scripts/convert_all.sh
          bash scripts/convert_all.sh

      - name: Commit converted rules back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add converted/
          git diff --staged --quiet || git commit -m "chore: auto-convert sigma rules [skip ci]"
          git push

      - name: Upload converted rules as artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-rules
          path: converted/

  deploy-elk:
    name: Deploy to ELK
    needs: convert
    runs-on: ubuntu-latest
    environment:
      name: production-elk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: converted-rules
          path: converted/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Deploy ELK rules
        env:
          KIBANA_URL:       ${{ secrets.KIBANA_URL }}
          ELASTIC_API_KEY:  ${{ secrets.ELASTIC_API_KEY }}
        run: python scripts/deploy_elk_rules.py

  deploy-wazuh:
    name: Deploy to Wazuh
    needs: deploy-elk
    runs-on: ubuntu-latest
    environment:
      name: production-wazuh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: converted-rules
          path: converted/

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Deploy Wazuh rules
        env:
          WAZUH_HOST:    ${{ secrets.WAZUH_HOST }}
          WAZUH_USER:    ${{ secrets.WAZUH_SSH_USER }}
          WAZUH_SSH_KEY: ${{ secrets.WAZUH_SSH_KEY_B64 }}
        run: bash scripts/deploy_wazuh_rules.sh

  deploy-elastalert2:
    name: Deploy to ElastAlert2
    needs: deploy-elk
    runs-on: ubuntu-latest
    environment:
      name: production-elastalert2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: converted-rules
          path: converted/

      - name: Deploy ElastAlert2 rules
        env:
          EA2_HOST:    ${{ secrets.EA2_HOST }}
          EA2_USER:    ${{ secrets.EA2_SSH_USER }}
          EA2_SSH_KEY: ${{ secrets.EA2_SSH_KEY_B64 }}
        run: bash scripts/deploy_elastalert2.sh

  deploy-sentinel:
    name: Deploy to Microsoft Sentinel
    needs: convert
    runs-on: ubuntu-latest
    environment:
      name: production-sentinel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: converted-rules
          path: converted/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Deploy Sentinel rules
        env:
          AZURE_TENANT_ID:         ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:         ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:     ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID:   ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP:    ${{ secrets.AZURE_RESOURCE_GROUP }}
          SENTINEL_WORKSPACE_NAME: ${{ secrets.SENTINEL_WORKSPACE_NAME }}
        run: python scripts/deploy_sentinel.py